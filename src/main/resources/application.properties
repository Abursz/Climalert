spring.application.name=climalert

# ---------------------------------------------------------------------------
# Base de datos H2 (en memoria) para el registro historico
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:climalert;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# WeatherAPI (https://www.weatherapi.com/docs/)
# La API key se define como variable de entorno, nunca se commitea el valor real.
# ---------------------------------------------------------------------------
weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.api-key=${WEATHERAPI_KEY:23312586d8644f21abb01240260707}
weatherapi.location=${WEATHERAPI_LOCATION:CABA}

# ---------------------------------------------------------------------------
# Correo saliente (SMTP).
# Para Gmail hay que usar una contraseña de aplicacion, no la contraseña normal.
# ---------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:bursztyn.alexis@gmail.com}
spring.mail.password=${MAIL_PASSWORD:Simeone10Simeone}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
# Configuracion de Climalert
# ---------------------------------------------------------------------------
# Ingesta del clima: cada 5 minutos (300000 ms)
climalert.fetch.fixed-rate-ms=300000
# Analisis de alertas: cada 1 minuto (60000 ms)
climalert.alert.fixed-rate-ms=60000
climalert.alert.recipients=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

logging.level.com.utn.climalert=INFO
